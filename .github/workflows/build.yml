name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-distribution: '25'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install

